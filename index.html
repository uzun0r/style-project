<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css"> 
</head>
<body class="career-body">
    <!-- Фоновые круги -->
    <div class="career-bg-circles">
        <div class="career-circle-1"></div>
        <div class="career-circle-2"></div>
        <div class="career-circle-3"></div>
        <div class="career-circle-4"></div>
    </div>

    <!-- Контейнер формы -->
    <div class="career-form-container">
        <div class="career-form-box">
            <!-- Круги внутри формы -->
            <div class="career-form-circles">
                <div class="career-form-circle-5"></div>
                <div class="career-form-circle-6"></div>
                <div class="career-form-circle-7"></div>
                <div class="career-form-circle-8"></div>
            </div>

            <!-- Содержимое формы -->
            <div class="career-form-content">
                <!-- Шапка формы -->
                <div class="career-form-header">
                    <div class="career-form-logo">Career Navigator</div>
                    <h2 class="career-form-title">Вход в систему</h2>
                    <p class="career-form-subtitle">Введите свои данные для доступа к аккаунту</p>
                </div>

                <!-- Flash сообщения (заменены на статический пример, можно удалить) -->
                <div class="flash-messages" style="display: none;">
                    <!-- Пример flash-сообщения, скрыт по умолчанию -->
                    <div class="alert alert-danger">
                        Неверный email или пароль
                    </div>
                </div>

                <!-- Форма входа -->
                <form action="login.html" method="post">
                    <!-- Email -->
                    <div class="career-form-group">
                        <label class="career-form-label">Электронная почта</label>
                        <input type="email" name="login_email" class="career-form-control" required
                               placeholder="example@email.com">
                    </div>

                    <!-- Пароль -->
                    <div class="career-form-group">
                        <label class="career-form-label">Пароль</label>
                        <input type="password" name="login_password" class="career-form-control" required
                               placeholder="Введите ваш пароль">
                    </div>

                    <!-- Забыли пароль -->
                    <div class="career-forgot-password">
                        < href="registration.html">Забыли пароль?</a>  <!-- Ссылка оставлена как # -->
                    </div>

                    <!-- Кнопка входа -->
                    <div class="career-form-group">
                        <button type="submit" class="career-btn-primary">Войти</button>
                    </div>

                    <!-- Разделитель -->
                    <div class="career-form-divider"></div>

                    <!-- Футер формы -->
                    <div class="career-form-footer">
                        <p>Нет аккаунта?</p>
                        <a href="register.html" class="career-btn-outline">Зарегистрироваться</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
