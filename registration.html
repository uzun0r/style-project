<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Базовые стили из предполагаемого файла style.css для корректного отображения */
        :root {
            --cornflower-blue: #5D9BEC;
            --coffee-crema: #B89B7B;
            --shadowed-lace: #C0B6A8;
        }
        .career-body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            margin: 0;
            padding: 0;
            position: relative;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .career-bg-circles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }
        .career-circle-1, .career-circle-2, .career-circle-3, .career-circle-4 {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite;
        }
        .career-circle-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        .career-circle-2 {
            width: 300px;
            height: 300px;
            top: 200px;
            right: -50px;
            animation-delay: 5s;
        }
        .career-circle-3 {
            width: 500px;
            height: 500px;
            bottom: -150px;
            left: 10%;
            animation-delay: 10s;
        }
        .career-circle-4 {
            width: 350px;
            height: 350px;
            bottom: 100px;
            right: 10%;
            animation-delay: 15s;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-30px) rotate(120deg); }
            66% { transform: translateY(20px) rotate(240deg); }
        }
        .career-form-container {
            max-width: 450px;
            width: 90%;
            margin: 2rem auto;
            position: relative;
            z-index: 10;
        }
        .career-form-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }
        .career-form-circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        .career-form-circle-5, .career-form-circle-6, .career-form-circle-7, .career-form-circle-8 {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
        }
        .career-form-circle-5 {
            width: 150px;
            height: 150px;
            top: -50px;
            right: -50px;
        }
        .career-form-circle-6 {
            width: 200px;
            height: 200px;
            bottom: -80px;
            left: -80px;
        }
        .career-form-circle-7 {
            width: 100px;
            height: 100px;
            bottom: 20px;
            right: 20px;
        }
        .career-form-circle-8 {
            width: 120px;
            height: 120px;
            top: 30px;
            left: 30px;
        }
        .career-form-content {
            position: relative;
            z-index: 2;
            color: white;
        }
        .career-form-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .career-form-logo {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .career-form-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .career-form-subtitle {
            opacity: 0.9;
            font-size: 1rem;
        }
        .career-form-group {
            margin-bottom: 1.5rem;
        }
        .career-form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
        }
        .career-form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .career-form-control:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }
        .career-form-control::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .career-form-hint {
            display: block;
            margin-top: 0.25rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
        }
        .career-btn-primary {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(45deg, var(--cornflower-blue), var(--coffee-crema));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .career-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .career-form-divider {
            height: 1px;
            background: rgba(255,255,255,0.2);
            margin: 2rem 0;
        }
        .career-form-footer {
            text-align: center;
        }
        .career-form-footer p {
            margin-bottom: 1rem;
            opacity: 0.9;
        }
        .career-btn-outline {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .career-btn-outline:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.5);
            color: white;
            text-decoration: none;
        }
        .flash-messages {
            margin-bottom: 1.5rem;
        }
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            position: relative;
        }
        .alert-dismissible {
            padding-right: 3rem;
        }
        .close {
            position: absolute;
            top: 0;
            right: 0;
            padding: 0.75rem 1rem;
            color: inherit;
            background: transparent;
            border: 0;
            font-size: 1.5rem;
            line-height: 1;
            opacity: 0.5;
            cursor: pointer;
        }
        .close:hover {
            opacity: 0.8;
        }
        .alert-danger {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #fff;
        }
        .alert-success {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid #28a745;
            color: #fff;
        }
        .alert-warning {
            background: rgba(255, 193, 7, 0.2);
            border: 1px solid #ffc107;
            color: #fff;
        }
        .alert-info {
            background: rgba(23, 162, 184, 0.2);
            border: 1px solid #17a2b8;
            color: #fff;
        }
    </style>
</head>
<body class="career-body">
    <!-- Фоновые круги -->
    <div class="career-bg-circles">
        <div class="career-circle-1"></div>
        <div class="career-circle-2"></div>
        <div class="career-circle-3"></div>
        <div class="career-circle-4"></div>
    </div>

    <!-- Контейнер формы -->
    <div class="career-form-container">
        <div class="career-form-box">
            <!-- Круги внутри формы -->
            <div class="career-form-circles">
                <div class="career-form-circle-5"></div>
                <div class="career-form-circle-6"></div>
                <div class="career-form-circle-7"></div>
                <div class="career-form-circle-8"></div>
            </div>

            <!-- Содержимое формы -->
            <div class="career-form-content">
                <!-- Шапка формы -->
                <div class="career-form-header">
                    <div class="career-form-logo">Career Navigator</div>
                    <h2 class="career-form-title">Регистрация</h2>
                    <p class="career-form-subtitle">Заполните форму для создания нового аккаунта</p>
                </div>

                <!-- Flash сообщения (скрыты по умолчанию) -->
                <div class="flash-messages" style="display: none;">
                    <!-- Пример flash-сообщения, скрыт по умолчанию -->
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        Пользователь с таким email уже существует
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                </div>

                <!-- Форма регистрации -->
                <form action="register.html" method="post">
                    <!-- Имя пользователя -->
                    <div class="career-form-group">
                        <label class="career-form-label">Имя пользователя</label>
                        <input type="text" name="reg_username" class="career-form-control" required
                               placeholder="Введите имя пользователя">
                        <span class="career-form-hint">Как к вам обращаться в системе</span>
                    </div>

                    <!-- Email -->
                    <div class="career-form-group">
                        <label class="career-form-label">Электронная почта</label>
                        <input type="email" name="reg_email" class="career-form-control" required
                               placeholder="example@email.com">
                        <span class="career-form-hint">Используйте действующий email адрес</span>
                    </div>

                    <!-- Пароль -->
                    <div class="career-form-group">
                        <label class="career-form-label">Пароль</label>
                        <input type="password" name="reg_password" class="career-form-control" required
                               placeholder="Придумайте надежный пароль">
                        <span class="career-form-hint">Минимум 8 символов</span>
                    </div>

                    <!-- Подтверждение пароля -->
                    <div class="career-form-group">
                        <label class="career-form-label">Подтвердите пароль</label>
                        <input type="password" name="reg_password_confirm" class="career-form-control" required
                               placeholder="Повторите пароль">
                    </div>

                    <!-- Кнопка регистрации -->
                    <div class="career-form-group">
                        <button type="submit" class="career-btn-primary">
                            Создать аккаунт
                        </button>
                    </div>

                    <!-- Разделитель -->
                    <div class="career-form-divider"></div>

                    <!-- Футер формы -->
                    <div class="career-form-footer">
                        <p>Уже зарегистрированы?</p>
                        <a href="login.html" class="career-btn-outline">
                            Войти в систему
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (только для закрытия alert) -->
    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
</body>
</html>
